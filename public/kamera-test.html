<!DOCTYPE html>
<html>
<body>
  <button onclick="test()">Kamera testen</button>
  <video id="v" autoplay muted playsinline style="width:100%"></video>
  <p id="status">Warte...</p>

  <script>
    async function test() {
      document.getElementById('status').textContent = 'Versuche...';
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: true });
        document.getElementById('v').srcObject = stream;
        document.getElementById('status').textContent = 'KAMERA FUNKTIONIERT!';
      } catch(e) {
        document.getElementById('status').textContent = 'FEHLER: ' + e.name + ' - ' + e.message;
      }
    }
  </script>
</body>
</html>
